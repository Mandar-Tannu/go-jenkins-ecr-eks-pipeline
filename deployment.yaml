apiVersion: apps/v1
kind: Deployment

metadata:
  name: go-app
  labels:
    app: go-app

spec:
  replicas: 2

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  selector:
    matchLabels:
      app: go-app

  template:
    metadata:
      labels:
        app: go-app

    spec:
      containers:
      - name: go-app

        image: IMAGE_PLACEHOLDER

        imagePullPolicy: Always

        env:

        - name: RDS_DB_HOST
          valueFrom:
            configMapKeyRef:
              name: go-app-config
              key: RDS_DB_HOST

        - name: RDS_DB_PORT
          valueFrom:
            configMapKeyRef:
              name: go-app-config
              key: RDS_DB_PORT

        - name: RDS_DB_NAME
          valueFrom:
            configMapKeyRef:
              name: go-app-config
              key: RDS_DB_NAME

        - name: RDS_DB_SSLMODE
          valueFrom:
            configMapKeyRef:
              name: go-app-config
              key: RDS_DB_SSLMODE

        - name: S3_BUCKET_NAME
          valueFrom:
            configMapKeyRef:
              name: go-app-config
              key: S3_BUCKET_NAME

        - name: RDS_DB_USER
          valueFrom:
            secretKeyRef:
              name: go-app-secret
              key: RDS_DB_USER

        - name: RDS_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: go-app-secret
              key: RDS_DB_PASSWORD

        ports:
        - containerPort: 8080

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"

          limits:
            cpu: "250m"
            memory: "256Mi"

        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20

